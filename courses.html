        function downloadInvoice() {
            const lastPurchase = JSON.parse(localStorage.getItem('lastPurchase')) || [];
            if (lastPurchase.length === 0) {
                alert('No purchases found. Please make a purchase first.');
                return;
            }
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            doc.text('ProximaLMS Invoice', 20, 20);
            doc.text('Date: ' + new Date().toLocaleDateString(), 20, 30);
            let y = 50;
            lastPurchase.forEach(item => {
                doc.text(`${item.title} - ₹${item.price}`, 20, y);
                y += 10;
            });
            const total = lastPurchase.reduce((sum, i) => sum + i.price, 0);
            doc.text(`Total: ₹${total}`, 20, y);
            doc.save('ProximaLMS_Invoice.pdf');
        }

function sendChat() {
    const input = document.getElementById('chatInput');
    const window = document.getElementById('chatWindow');
    const msg = input.value.trim().toLowerCase();

    if (msg === "") return;

    // 1. Add User Message
    window.innerHTML += `<div style="background: var(--purple-primary); color: white; padding: 8px 12px; border-radius: 10px; align-self: flex-end; max-width: 85%; font-size: 14px;">You: ${input.value}</div>`;

    // 2. Find Response
    let botResponse = ProximaChatData["default"];
    for (let key in ProximaChatData) {
        if (msg.includes(key)) {
            botResponse = ProximaChatData[key];
            break;
        }
    }

    // 3. Add AI Response with delay
    setTimeout(() => {
        window.innerHTML += `<div style="background: white; padding: 8px 12px; border-radius: 10px; border: 1px solid #eef0ff; align-self: flex-start; max-width: 85%; font-size: 14px;">AI: ${botResponse}</div>`;
        window.scrollTop = window.scrollHeight; // Auto-scroll
    }, 500);

    input.value = ""; // Clear input
    window.scrollTop = window.scrollHeight; // Auto-scroll
}
