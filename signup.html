<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proxima LMS - Sign Up</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-purple: #4B1D6B;
            --light-bg: #E8F0FE;
            --text-gray: #666;
            --gradient: linear-gradient(135deg, #DCD0F1 0%, #A589D9 100%);
        }

        * { box-sizing: border-box; }
        body, html {
            margin: 0; padding: 0; min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: #f0f2f5;
            display: flex; justify-content: center; align-items: center;
        }

        .signup-card {
            display: flex; width: 1100px; max-width: 90%;
            background: white; border-radius: 24px;
            overflow: hidden; box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            margin: 20px;
        }

        .branding {
            flex: 1; background: var(--gradient);
            display: flex; justify-content: center; align-items: center;
            padding: 40px;
        }

        .branding img { width: 80%; max-width: 280px; }

        .form-area {
            flex: 1.3; padding: 50px 60px;
            display: flex; flex-direction: column; justify-content: center;
        }

        .form-area h1 { font-size: 2rem; margin: 0 0 10px 0; color: #333; }
        .subtitle { color: var(--text-gray); margin-bottom: 25px; }

        .input-row { display: flex; gap: 15px; }
        .input-group { margin-bottom: 15px; flex: 1; }
        .input-group label { display: block; margin-bottom: 8px; font-weight: 500; font-size: 14px; }
        
        .input-wrapper input {
            width: 100%; padding: 12px; background: var(--light-bg);
            border: none; border-radius: 10px; font-size: 15px; outline: none;
        }

        .terms { font-size: 13px; color: var(--text-gray); margin: 20px 0; display: flex; align-items: flex-start; }
        .terms input { margin-right: 10px; margin-top: 3px; }

        .btn-primary {
            background: var(--primary-purple); color: white; border: none;
            padding: 16px; border-radius: 10px; font-size: 16px; font-weight: 600;
            cursor: pointer; width: 100%; transition: 0.3s;
        }

        .switch-link { text-align: center; margin-top: 20px; font-size: 15px; color: var(--text-gray); }
        .switch-link a { color: var(--primary-purple); text-decoration: none; font-weight: 700; }

        /* RESPONSIVE BREAKPOINTS */
        @media (max-width: 992px) {
            .signup-card { width: 90%; }
            .form-area { padding: 40px; }
        }

        @media (max-width: 768px) {
            .signup-card { flex-direction: column; width: 100%; max-width: 500px; }
            .input-row { flex-direction: column; gap: 0; }
            .branding { padding: 40px 20px; }
            .form-area { padding: 30px 25px; }
        }
    </style>
</head>
<body>
    <div class="signup-card">
        <div class="branding">
            <img src="kalpra-logo.png" alt="ProximaLMS Logo">
        </div>
        <div class="form-area">
            <h1>Create Account</h1>
            <p class="subtitle">Join ProximaLMS to start your AI learning journey</p>
            <form>
                <div class="input-row">
                    <div class="input-group">
                        <label>First Name</label>
                        <div class="input-wrapper"><input type="text" placeholder="Rajasekhar" required></div>
                    </div>
                    <div class="input-group">
                        <label>Last Name</label>
                        <div class="input-wrapper"><input type="text" placeholder="Bevara" required></div>
                    </div>
                </div>
                <div class="input-group">
                    <label>Email Address</label>
                    <div class="input-wrapper"><input type="email" placeholder="name@example.com" required></div>
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <div class="input-wrapper"><input type="password" placeholder="Create password" required></div>
                </div>
                <div class="input-group">
                    <label>Confirm Password</label>
                    <div class="input-wrapper"><input type="password" placeholder="Repeat password" required></div>
                </div>
                <label class="terms">
                    <input type="checkbox" required> I agree to the Terms of Service and Privacy Policy.
                </label>
                <button type="submit" class="btn-primary">Create Account</button>
            </form>
            <div class="switch-link">Already have an account? <a href="login.html">Sign in</a></div>
        </div>
    </div>
</body>
</html>
